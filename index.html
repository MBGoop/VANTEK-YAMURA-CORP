<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f2a12">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GRIT">
<title>GRIT — Specimen Growth Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<!-- PWA: inline manifest + icoon (pixel-specimen), zodat alles 1 bestand blijft -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230f2a12'/%3E%3Crect x='4' y='3' width='8' height='8' fill='%236fae5c'/%3E%3Crect x='5' y='5' width='2' height='2' fill='%230f2a12'/%3E%3Crect x='9' y='5' width='2' height='2' fill='%230f2a12'/%3E%3Crect x='6' y='11' width='1' height='2' fill='%232d5a30'/%3E%3Crect x='9' y='11' width='1' height='2' fill='%232d5a30'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230f2a12'/%3E%3Crect x='4' y='3' width='8' height='8' fill='%236fae5c'/%3E%3Crect x='5' y='5' width='2' height='2' fill='%230f2a12'/%3E%3Crect x='9' y='5' width='2' height='2' fill='%230f2a12'/%3E%3C/svg%3E">
<style>
/* =====================================================
   VANTEK-YAMURA CORP · SPECIMEN GROWTH MONITOR v3
   Gameboy 4-shade palette · CRT terminal · deep space
===================================================== */
:root{
  --g0:#0f2a12; --g1:#2d5a30; --g2:#6fae5c; --g3:#b6d98a; --g3b:#cfe8a9;
  --r:6px;
  --pix:'Press Start 2P','Courier New',monospace;   /* chrome: titels, knoppen, HUD */
  --body:'VT323','Courier New',monospace;            /* leesbare body-tekst */
  --fs:1;                                            /* tekstgrootte-schaal (S/M/L) */
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--g0); color:var(--g3);
  font-family:var(--pix);
  font-size:10px; line-height:1.8; overflow-x:hidden;
  image-rendering:pixelated;
}
/* leesbare body-tekst: VT323 is groter per em, dus flink opschalen */
p, .body, .ex .hint,
.station .nm, .speech, .warnbox, .legend, .block p, .ex .nm{
  font-family:var(--body);
  font-size:calc(16px * var(--fs));
  line-height:1.4;
  letter-spacing:0.3px;
}
/* .tiny in body-context ook leesbaar */
p.tiny, .tiny.body{font-size:calc(14px * var(--fs))}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:100;
  background:repeating-linear-gradient(to bottom,rgba(0,0,0,.13) 0 1px,transparent 1px 3px);}
body.comfort::after{display:none}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:64px}
.hidden{display:none!important}
.spacer{flex:1}
.row{display:flex;gap:8px;align-items:center}
.center{text-align:center}
.dim{color:#8fc47a}
.tiny{font-size:8px}

.panel{background:var(--g1);border:3px solid var(--g2);border-radius:var(--r);padding:12px;margin:0 10px 10px;box-shadow:0 3px 0 #081a0a}
.panel h2{font-size:10px;color:var(--g3b);margin-bottom:8px;letter-spacing:1px}
.panel.inv{background:var(--g0);border-color:var(--g1)}

button{font:inherit;cursor:pointer;color:var(--g0);border:none;border-radius:var(--r)}
.btn{display:block;width:100%;padding:12px;background:var(--g3);font-size:10px;border-bottom:4px solid var(--g2);text-transform:uppercase}
.btn:active{transform:translateY(2px);border-bottom-width:2px}
.btn.ghost{background:var(--g1);color:var(--g3);border:2px solid var(--g2);border-bottom-width:4px}
.btn.small{width:auto;display:inline-block;padding:8px 10px;font-size:8px}
.btn:disabled{opacity:.4}
.altbtn{background:var(--g0);color:var(--g3);border:2px solid var(--g2);font-size:7px;padding:4px 6px;border-radius:var(--r)}

#hud{background:var(--g2);color:var(--g0);padding:6px 10px;font-size:8px;display:flex;flex-wrap:wrap;gap:4px 12px;border-bottom:3px solid var(--g0)}
#hud b{font-size:8px}
#hud .stat{display:flex;gap:4px;align-items:center}
.corp{background:var(--g0);color:var(--g2);text-align:center;font-size:7px;padding:4px 6px;letter-spacing:2px}

#sceneWrap{position:relative;margin:10px;border:4px solid var(--g2);border-radius:var(--r);overflow:hidden;box-shadow:0 4px 0 #081a0a}
#scene{display:block;width:100%;image-rendering:pixelated;background:var(--g0)}
.lvlbar{display:flex;align-items:center;gap:6px;background:var(--g0);padding:5px 8px;border-top:3px solid var(--g2)}
.lvlbar .bar{flex:1;height:8px;background:var(--g1);border:2px solid var(--g2)}
.lvlbar .fill{height:100%;background:var(--g3)}
.nameplate{background:var(--g1);text-align:center;padding:8px;font-size:12px;color:var(--g3b);border-top:3px solid var(--g2)}
.nameplate .sub{font-size:7px;color:var(--g2);margin-top:4px;letter-spacing:1px}
.speech{margin:0 10px 10px;background:var(--g0);border:2px dashed var(--g2);border-radius:var(--r);padding:8px 10px;line-height:1.9;color:var(--g3)}
.speech::before{content:'> '}

.meter{margin:7px 0}
.meter .lab{display:flex;justify-content:space-between;font-size:8px;color:var(--g3);margin-bottom:3px}
.meter .bar{height:10px;background:var(--g0);border:2px solid var(--g2)}
.meter .fill{height:100%;background:var(--g3);transition:width .4s steps(8)}
.badge{display:inline-block;padding:3px 8px;font-size:7px;border:2px solid var(--g3);border-radius:var(--r);text-transform:uppercase}
.badge.light{border-style:dashed}

nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--g1);display:flex;border-top:4px solid var(--g2);z-index:20}
nav button{flex:1;background:none;color:var(--g2);padding:9px 0 max(9px,env(safe-area-inset-bottom));font-size:7px;border-radius:0;display:flex;flex-direction:column;align-items:center;gap:3px}
nav button .nic{width:22px;height:22px;image-rendering:pixelated}
nav button.active{color:var(--g3b);background:var(--g0)}

input[type=text],input[type=number]{
  width:100%;padding:10px;border:3px solid var(--g2);border-radius:var(--r);
  background:var(--g0);color:var(--g3);font:inherit;font-size:10px;
}
input.mini{width:64px;padding:6px;font-size:9px;text-align:center}
input[type=range]{width:100%;accent-color:var(--g3);height:22px}
label{font-size:8px;color:var(--g2);display:block;margin:12px 0 6px;text-transform:uppercase}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:9px 10px;background:var(--g0);color:var(--g3);border:2px solid var(--g1);border-radius:var(--r);font-size:8px}
.chip.sel{background:var(--g3);color:var(--g0);border-color:var(--g3b)}
.warnbox{border:2px solid var(--g3);border-radius:var(--r);padding:10px;line-height:1.9;margin-top:10px;background:var(--g0)}

.block{background:var(--g0);border:2px solid var(--g1);border-radius:var(--r);padding:8px 10px;margin-top:8px}
.block h4{font-size:8px;color:var(--g2);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.ex{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:2px dotted var(--g1);font-family:var(--body);font-size:calc(16px * var(--fs));line-height:1.4}
.ex:last-child{border:none}
.ex .exmain{flex:1;min-width:0}
.ex .dose{font-family:var(--body);font-size:calc(16px * var(--fs));color:#8fc47a;white-space:nowrap}
.ex .hint{display:block;font-family:var(--body);font-size:calc(14px * var(--fs));color:#8fc47a;margin-top:2px}
.ex.swapped .nm{color:var(--g3b);text-decoration:underline}
.week-strip{display:flex;gap:4px;margin:0 10px 10px;overflow-x:auto}
.wday{flex:1;min-width:48px;background:var(--g1);border:2px solid var(--g1);border-radius:var(--r);padding:6px 2px;text-align:center;font-size:8px}
.wday.today{border-color:var(--g3)}
.wday.done{background:var(--g2);color:var(--g0)}
.wday .t{font-size:6px;opacity:.8}
.subtabs{display:flex;gap:6px;margin:0 10px 10px}
.subtabs button{flex:1;padding:9px;font-size:8px;background:var(--g1);color:var(--g3);border:2px solid var(--g2)}
.subtabs button.on{background:var(--g3);color:var(--g0)}

/* agenda */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal .h{font-size:6px;color:var(--g2);text-align:center;padding:2px 0}
.cal .d{aspect-ratio:1;background:var(--g0);border:2px solid var(--g1);border-radius:4px;font-size:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--g3);gap:1px;padding:0}
.cal .d.out{opacity:.3}
.cal .d.today{border-color:var(--g3)}
.cal .d.done{background:var(--g2);color:var(--g0)}
.cal .d .mk{font-size:5px;line-height:1}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;font-family:var(--body);font-size:calc(13px * var(--fs));color:#8fc47a}

/* bib */
.bibitem{border:2px solid var(--g1);border-radius:var(--r);padding:12px 12px;margin-top:10px;background:var(--g0)}
.bibitem.na{opacity:.55}
.bibitem .nm{font-family:var(--pix);font-size:11px;color:var(--g3b);line-height:1.6}
.bibitem .meta{font-family:var(--body);font-size:calc(15px * var(--fs));color:#8fc47a;margin:6px 0;line-height:1.5}
.bibitem p{font-family:var(--body);font-size:calc(17px * var(--fs));line-height:1.45;margin-top:6px;color:var(--g3)}
.bibitem .rp{font-family:var(--body);font-size:calc(16px * var(--fs));color:#8fc47a;margin-top:8px;line-height:1.6}
.bibitem .rp b{color:var(--g3b)}

/* stations */
.station{display:flex;gap:8px;padding:8px 0;border-bottom:2px dotted var(--g1);font-family:var(--body);font-size:calc(16px * var(--fs));align-items:center}
.station:last-child{border:none}
.station .no{background:var(--g2);color:var(--g0);min-width:20px;text-align:center;padding:3px 0;border-radius:4px;font-size:8px}
.station .exmain{flex:1}

.overlay{position:fixed;inset:0;background:rgba(4,12,5,.85);display:flex;align-items:flex-end;justify-content:center;z-index:50}
.sheet{background:var(--g1);border:4px solid var(--g2);border-bottom:none;border-radius:10px 10px 0 0;padding:16px 14px calc(18px + env(safe-area-inset-bottom));width:100%;max-width:480px;max-height:85vh;overflow-y:auto;animation:up .2s steps(4)}
@keyframes up{from{transform:translateY(30px)}to{transform:none}}

.timer{font-size:26px;text-align:center;margin:10px 0;color:var(--g3b);letter-spacing:2px}
.resttimer{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--g3);color:var(--g0);padding:8px 16px;border-radius:var(--r);border:3px solid var(--g0);font-size:12px;z-index:30;box-shadow:0 3px 0 #081a0a}
.pr-list li{list-style:none;display:flex;justify-content:space-between;padding:6px 0;border-bottom:2px dotted var(--g1);font-family:var(--body);font-size:calc(15px * var(--fs))}
.shop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.shop-item{background:var(--g0);border:2px solid var(--g1);border-radius:var(--r);padding:8px 4px;text-align:center;font-size:7px;color:var(--g3)}
.shop-item canvas{width:52px;height:52px;image-rendering:pixelated}
.shop-item.owned{border-color:var(--g2)}
.shop-item.eq{border-color:var(--g3);background:var(--g1)}
.shop-item .price{color:var(--g3b)}
#bwchart{width:100%;image-rendering:pixelated;border:2px solid var(--g1);border-radius:var(--r);background:var(--g0)}

#onb{padding:14px 12px 30px}
.term-header{border:3px solid var(--g2);border-radius:var(--r);padding:10px;text-align:center;margin-bottom:12px;background:var(--g1)}
.term-header h1{font-size:13px;color:var(--g3b);letter-spacing:1px}
.dots{display:flex;gap:5px;justify-content:center;margin:12px 0 16px}
.dots span{width:10px;height:10px;background:var(--g1);border:2px solid var(--g2)}
.dots span.on{background:var(--g3)}
.pick-variant{display:flex;gap:8px;justify-content:center;margin:12px 0}
.pick-variant button{background:var(--g0);border:3px solid var(--g1);border-radius:var(--r);padding:8px;color:var(--g3);font-size:7px}
.pick-variant button.sel{border-color:var(--g3)}
.pick-variant canvas{width:64px;height:64px;image-rendering:pixelated;display:block;margin:0 auto 4px}

.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:var(--g3);color:var(--g0);padding:9px 14px;border:3px solid var(--g0);border-radius:var(--r);font-size:8px;z-index:99;box-shadow:0 3px 0 #081a0a;max-width:90%;text-align:center}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =====================================================
   GRIT v3 — Specimen Growth Monitor · VANTEK-YAMURA CORP
   Vanilla JS · localStorage · ?test = testmodus
===================================================== */
'use strict';
const $=s=>document.querySelector(s);
const APP=$('#app');
const TEST=new URLSearchParams(location.search).has('test');
const DAY=86400000;
const REDUCED=matchMedia('(prefers-reduced-motion: reduce)').matches;
const todayStr=()=>{const d=new Date(Date.now()+(S?S.dayOffset*DAY:0));return d.toISOString().slice(0,10)};
const fmtTime=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(Math.floor(s%60)).padStart(2,'0')}`;

/* ---------------- STATE ---------------- */
let S=null;
const DEFAULT={
  v:3, dayOffset:0,
  profile:null, gear:null, goals:[], days:3, dur:30,
  creature:{variant:0,name:'SPECIMEN-01'},
  xp:0, coins:0,
  stats:{power:0,speed:0,grit:0,mobility:0},
  recovery:70, energy:70, lastCheckin:null, rpeLog:[],
  streak:0, lastActive:null, freezeWeek:null, _streakDay:null,
  planStart:null, plan:null, done:{},
  hyroxPRs:[], quests:{},
  owned:[], equipped:[],
  exLog:{},          // exLog[key]=[{d,w,r}]  gewicht/reps historiek
  bw:[],             // [{d,kg}] lichaamsgewicht
  overrides:{},      // agenda-aanpassingen
  race:null,         // wedstrijd-deadline
  cues:true,         // audio/haptische cues
  fontScale:1,       // tekstgrootte S/M/L (0.85 / 1 / 1.2)
  comfort:false,     // rustige modus: scanlines + animatie uit
  notes:{},          // notes[date]="voelde zwaar"
  badges:[],         // behaalde mijlpaal-ids
  history:[]         // [{d, type, rpe, frac, xp}] sessie-log voor historie/samenvatting
};
function load(){try{const r=localStorage.getItem('grit2');S=r?Object.assign(structuredClone(DEFAULT),JSON.parse(r)):structuredClone(DEFAULT)}catch(e){S=structuredClone(DEFAULT)}}
function save(){localStorage.setItem('grit2',JSON.stringify(S))}
/* tekstgrootte + comfort-modus (scanlines/animatie) toepassen */
function applyVisuals(){
  document.documentElement.style.setProperty('--fs', S.fontScale||1);
  document.body.classList.toggle('comfort', !!S.comfort);
}
/* animatie uit als comfort AAN of systeem reduced-motion */
function motionOff(){return REDUCED || (S&&S.comfort)}
load();

/* ---------------- XP / LEVEL ---------------- */
const level=()=>Math.min(30,Math.floor(Math.sqrt(S.xp/40))+1);
const xpForNext=()=>40*Math.pow(level(),2);
const stage=()=>level()>=10?3:level()>=4?2:1;
function gainXP(x,coins=0){
  const l0=level(), st0=stage();
  S.xp+=x; S.coins+=coins;
  if(level()>l0){
    toast(stage()>st0?`!! MUTATIE !! ${S.creature.name} evolueert naar fase ${stage()}`:`LEVEL ${level()} — ${S.creature.name} groeit`);
  }
  save();
}
function dominantStat(){
  const e=Object.entries(S.stats).sort((a,b)=>b[1]-a[1]);
  return e[0][1]===0?null:e[0][0];
}

/* =====================================================
   PIXEL ENGINE — 160x144, 4 tinten, deep space
===================================================== */
const PALETTES=[
 ['#0f2a12','#2d5a30','#6fae5c','#b6d98a'],
 ['#241a08','#5c4318','#a9843a','#e0c37a'],
 ['#0a1f2a','#1e4a5c','#4f93a9','#a4d5e0'],
];
const VARIANT_NAMES=['BIO','AMBER','CRYO'];
/* STAR PUP — zwevend zero-g wezentje, 3 fases
   . transparant, 0..3 palettint, E oog */
const SPRITES=[
/* FASE 1: pup-pod (12x11) — zwevend bolletje met antennes */
[
".2........2.",
".3........3.",
"..22222222..",
".2222222222.",
".22E2222E22.",
".2222222222.",
".2222332222.",
".222M22M222.",
"..22222222..",
"...22..22...",
"...11..11..."
],
/* FASE 2: juveniel (16x16) — biped met antennes en staart */
[
"....1......1....",
"....3......3....",
".....222222.....",
"....22222222....",
"...2E222222E2...",
"...2222222222...",
"...222M22M222...",
"....22222222....",
".22.22233222.22.",
".22.22233222.22.",
"....22222222..2.",
"....22222222.2..",
"....222..222....",
"....222..222....",
"...1122..2211...",
"................"
],
/* FASE 3: adult (24x20) — gehoornd ruimtebeest met energie-crest */
[
"...11....3333....11.....",
"...131..333333..131.....",
"....11.33333333.11......",
"......2222222222........",
".....222222222222.......",
".....2E22222222E2.......",
".....222222222222.......",
"......22M2222M22........",
"....22222222222222......",
"..22.222233332222.22....",
"..22.222233332222.22....",
"..22.222222222222.22....",
".....222222222222.......",
".....222222222222....2..",
".....2222..2222.....2...",
".....2222..2222....2....",
".....2222..2222.........",
"....112222.222211.......",
"........................",
"........................"
]];
const ITEMS=[
 {id:'antenne', name:'BIO-ANTENNE', price:30},
 {id:'visor',   name:'CORP VISOR',  price:50},
 {id:'tank',    name:'O2-TANK',     price:45},
 {id:'drone',   name:'MINI-DRONE',  price:60},
 {id:'plant',   name:'HOLO-FLORA',  price:25},
 {id:'band',    name:'ZWEETBAND',   price:35},
];

const SC={cv:null,ctx:null,t:0,raf:null,comet:null};
function px(x,y,w,h,c){SC.ctx.fillStyle=c;SC.ctx.fillRect(x|0,y|0,w,h)}
function pal(){return PALETTES[S?S.creature.variant:0]}
function drawSprite(grid,ox,oy,P,blink){
  grid.forEach((row,y)=>{[...row].forEach((ch,x)=>{
    if(ch==='.')return;
    let c;
    if(ch==='E')c=blink?P[2]:P[0];
    else if(ch==='M')c=P[0];
    else c=P[+ch];
    px(ox+x,oy+y,1,1,c);
  })});
}
function drawItems(ox,oy,w,P,eq){
  eq.forEach(id=>{
    switch(id){
      case 'antenne':
        px(ox+w/2|0,oy-4,1,4,P[1]); px(ox+(w/2|0)-1,oy-6,3,2,P[3]); break;
      case 'visor':{
        const ey=oy+(w>=20?5:w>=14?4:4);
        px(ox+2,ey,w-4,2,P[0]); px(ox+3,ey,2,2,P[2]); px(ox+w-6,ey,2,2,P[2]); break;}
      case 'tank':
        px(ox-4,oy+(w/2|0),3,7,P[1]); px(ox-3,oy+(w/2|0)-2,1,2,P[3]); break;
      case 'band':
        px(ox+2,oy+2,w-4,2,P[1]); px(ox+3,oy+2,2,2,P[3]); break;
    }
  });
}
/* ---- SPACESHIP INTERIEUR ---- */
function drawScene(){
  const P=pal(), t=SC.t;
  const W=160,H=144;
  SC.ctx.clearRect(0,0,W,H);
  /* == groot venster met de ruimte (y 6..62) == */
  px(0,0,W,H,P[1]);                       /* romp-basis */
  px(6,6,W-12,58,P[0]);                   /* venster: diepe ruimte */
  /* sterren (twinkelend) */
  [[16,14],[34,42],[52,20],[70,50],[88,12],[104,34],[122,46],[138,18],[26,28],[118,24],[62,36],[146,40]].forEach(([x,y],i)=>{
    if(((t>>5)+i)%6!==0)px(x,y,1,1,P[3]);
  });
  /* planeet rechts met ring */
  px(120,26,14,3,P[2]);px(118,29,18,3,P[2]);px(120,32,14,3,P[2]);

const CATS=['ALLE','STRENGTH','CONDITIONING','HYROX','MOBILITY'];
function has(need){
  if(!S.gear)return need==='geen';
  return need.split('|').some(n=>({
    geen:true, kb:S.gear.kbs.length>0, kb2:S.gear.kbs.length>1,
    band:S.gear.bands, trap:S.gear.trap, run:S.gear.lopen!=='nee'
  })[n]);
}
function pick(keys,rot=0){
  /* alle beschikbare opties (materiaal-gefilterd), dan roteren op basis van rot */
  const avail=keys.filter(k=>has(EX[k].need));
  const pool=avail.length?avail:[keys[keys.length-1]];
  const k=pool[((rot%pool.length)+pool.length)%pool.length];
  return {key:k, swapped:EX[k].zone&&S.profile.pijnzones.includes(EX[k].zone)};
}
/* gewichtssuggestie uit eigen KB's */
function suggestKB(key){
  if(!S.gear||!S.gear.kbs.length)return null;
  const e=EX[key]; if(!e||!e.wt)return null;
  const sorted=[...S.gear.kbs].sort((a,b)=>a-b);
  if(e.wt==='heavy')return sorted[sorted.length-1];
  if(e.wt==='light')return sorted[0];
  return sorted[Math.floor((sorted.length-1)/2)];
}
function lastLog(key){const l=S.exLog[key];return l&&l.length?l[l.length-1]:null}

/* ---------------- PLAN GENERATOR ---------------- */
const DAYTYPES={
 2:['mixed','mixed'],
 3:['strength','conditioning','circuit'],
 4:['strength','conditioning','circuit','mobility'],
 5:['strengthL','conditioning','strengthU','mobility','circuit'],
 6:['strengthL','conditioning','strengthU','conditioning2','mobility','circuit'],
};
function buildSession(type,week,dur,taper=1,rotBase=0){
  const scale=(dur<=20?0.7:dur<=30?1:dur<=45?1.3:1.6)*taper;
  const st=b=>{let v=b+(week>=2?1:0);if(week===4)v=Math.max(2,Math.round(v*0.7));v=Math.round(v*taper);return Math.max(2,Math.min(5,Math.round(v*(scale>1.2?1.15:1))))};
  const rondes=b=>{let v=b+(week===2||week===3?1:0);if(week===4)v=Math.max(2,v-1);return Math.max(2,Math.round(v*scale))||2};
  const int=week===3?' / korter rusten':'';
  const w={warm:[],main:[],fin:[],cool:[],type,week};
  /* r = rotatie-index: verschilt per week EN per slot, zodat oefeningen echt variëren */
  const r=(slot)=>rotBase+slot;
  const P=(keys,slot)=>pick(keys,r(slot));
  if(type==='strength'||type==='strengthL'){
    w.warm=[['march','3 min'],'hip hinges + band pull-aparts'];
    w.main=[
      [P(['gobletsquat','bwsquat','gobletbox','splitsquat'],0),`${st(3)}x8${int}`],
      [P(['kbdl','hinge','sldl'],1),`${st(3)}x8`],
      [P(['lunge','splitsquat','lunge2'],2),`${st(3)}x10/been`],
      [P(['core','hips'],3),`${st(3)}x8/zijde`]];
    w.fin=[[P(['swing','wallball','mountain','burpee'],4),`${rondes(3)} min EMOM`]];
  }else if(type==='strengthU'){
    w.warm=[['march','3 min'],'schouder-cirkels + pull-aparts'];
    w.main=[
      [P(['pushup','declpush','pikepush'],0),`${st(3)}x10`],
      [P(['kbrow','bandrow'],1),`${st(3)}x8/kant`],
      [P(['press','pikepush'],2),`${st(3)}x6-8`],
      [P(['shoulders','bandpull'],3),`${st(3)}x15`]];
    w.fin=[[P(['core','mountain'],4),`${rondes(2)} rondes`]];
  }else if(type==='conditioning'||type==='conditioning2'){
    w.warm=[['march','5 min op tempo komen']];
    w.main=[[P(['runint','trapint','shuttle','highknee','march'],0),`${rondes(8)} intervallen${int}`]];
    w.fin=[[P(['carry','mountain','jumpingjack'],1),`${rondes(3)}x gangetje`]];
  }else if(type==='mixed'){
    w.warm=[['march','4 min + hinges']];
    w.main=[
      [P(['gobletsquat','bwsquat','gobletbox','splitsquat'],0),`${st(3)}x8`],
      [P(['pushup','declpush','pikepush'],1),`${st(3)}x8`],
      [P(['bandrow','kbrow'],2),`${st(3)}x10`],
      [P(['runint','trapint','highknee','march'],3),`${rondes(5)} intervallen`]];
    w.fin=[[P(['wallball','burpee','mountain'],4),`${rondes(3)} min AMRAP`]];
  }else if(type==='circuit'){
    w.warm=[['march','5 min']];
    w.main=[
      [P(['runint','trapint','highknee','march'],0),'2 min tempo'],
      [P(['kbdl','hinge','sldl'],1),'10 reps'],
      [P(['wallball','squathold'],2),'8 reps'],
      [P(['carry','lunge2'],3),'20 m'],
      [P(['burpee','mountain'],4),`${week>=3?8:6} reps`],
      [P(['sled','stepup','jumpingjack'],5),'20 m / 10 reps']];
    w.fin=[['ROND',`${rondes(3)}`]];
  }else{
    w.warm=[['march','3 min losjes']];
    w.main=[
      [P(['hips'],0),'3 min'],
      [P(['ankles'],1),'3 min'],
      [P(['shoulders','bandpull'],2),'3 min'],
      [P(['core'],3),'2 rondes']];
    w.fin=[['ROND','rustige wandeling als afsluiter']];
  }
  w.cool=['3-5 min stretchen + rustig ademen'];
  return w;
}
/* absoluut weeknummer sinds planstart: rotatie-basis voor oefeningvariatie */
function absWeek(ds){
  if(!S.planStart)return 0;
  const d=Math.floor((new Date(ds)-new Date(S.planStart))/DAY);
  return Math.max(0,Math.floor(d/7));
}
/* volledige sessie voor een datum: type-resolver + taper + oefening-overrides */
function sessionPlan(ds,forceLight){
  const ses=sessionForDate(ds);
  if(!ses)return null;
  const week=weekForDate(ds);
  const dur=forceLight?Math.max(20,S.dur-15):S.dur;
  const w=buildSession(ses.type,week,dur,taperFactor(ds),absWeek(ds));
  w.meta=ses;
  /* per-datum oefening-overrides toepassen op de main-set */
  const ov=S.overrides[ds];
  if(ov&&ov.ex){
    w.main=w.main.map((it,i)=>{
      if(ov.ex.rm&&ov.ex.rm.includes(i))return null;
      if(ov.ex.swap&&ov.ex.swap[i]&&typeof it[0]==='object'){
        return [{key:ov.ex.swap[i],swapped:EX[ov.ex.swap[i]].zone&&S.profile.pijnzones.includes(EX[ov.ex.swap[i]].zone)}, it[1]];
      }
      return it;
    }).filter(Boolean);
    if(ov.ex.add)ov.ex.add.forEach(a=>w.main.push([{key:a.key,swapped:false}, a.dose||'3x8']));
  }
  return w;
}
function generatePlan(){
  S.plan={types:DAYTYPES[S.days],slots:{2:[1,4],3:[1,3,5],4:[1,3,5,6],5:[1,2,3,5,6],6:[1,2,3,4,5,6]}[S.days]};
  S.planStart=todayStr();save();
}
function weekForDate(ds){
  if(!S.planStart)return 1;
  const d=Math.floor((new Date(ds)-new Date(S.planStart))/DAY);
  if(d<0)return 1;
  return (Math.floor(d/7)%4)+1;
}
function planWeek(){return weekForDate(todayStr())}
/* basis-sessie uit het gegenereerde plan (zonder overrides) */
function basePlanSession(ds){
  if(!S.plan)return null;
  const dow=new Date(ds).getDay();
  const idx=S.plan.slots.indexOf(dow);
  if(idx<0)return null;
  return {type:S.plan.types[idx],idx};
}
/* uiteindelijke sessie inclusief overrides:
   ov.rest=true -> rustdag ; ov.type -> ander dagtype ; ov.movedTo -> verplaatst weg
   een dag kan ook een INKOMENDE verplaatsing hebben (andere dag met movedTo=ds) */
function sessionForDate(ds){
  const ov=S.overrides[ds]||{};
  if(ov.rest)return null;
  /* inkomende verplaatsing? zoek een dag die hierheen verplaatst is */
  for(const src in S.overrides){
    if(S.overrides[src].movedTo===ds){
      const base=S.overrides[src].type||(basePlanSession(src)||{}).type;
      if(base)return {type:base,moved:true,from:src};
    }
  }
  if(ov.movedTo)return null; /* deze dag is weg-verplaatst */
  const base=basePlanSession(ds);
  if(!base&&!ov.type)return null;
  return {type:ov.type||base.type, idx:base?base.idx:0};
}
/* taper: als er een race is, in de laatste 10 dagen volume afbouwen */
function taperFactor(ds){
  if(!S.race||!S.race.date)return 1;
  const daysToRace=Math.floor((new Date(S.race.date)-new Date(ds))/DAY);
  if(daysToRace<0||daysToRace>10)return 1;
  if(daysToRace<=2)return 0.5;      /* laatste 2 dagen: heel licht */
  if(daysToRace<=6)return 0.7;      /* wedstrijdweek */
  return 0.85;                       /* week ervoor */
}
function raceCountdown(){
  if(!S.race||!S.race.date)return null;
  const d=Math.floor((new Date(S.race.date)-new Date(todayStr()))/DAY);
  return d;
}

/* ---------------- RECOVERY / STREAK / QUESTS ---------------- */
function computeRecovery(sleep,feel){
  const recent=S.rpeLog.slice(-3);
  const rpePen=recent.filter(r=>r>=9).length*12 + (recent.length?Math.max(0,(recent.reduce((a,b)=>a+b,0)/recent.length-7))*6:0);
  S.recovery=Math.max(5,Math.min(100,Math.round(sleep*12+feel*10-rpePen)));
  S.energy=Math.max(5,Math.min(100,Math.round(sleep*14+feel*8)));
}
function dayMode(){return S.recovery<40?'light':S.recovery>=70?'push':'normal'}
function updateStreak(){
  if(!S.lastActive)return;
  const gap=Math.floor((new Date(todayStr())-new Date(S.lastActive))/DAY);
  if(gap===3){
    const wk=todayStr().slice(0,8);
    if(S.freezeWeek!==wk){S.freezeWeek=wk;save();toast('STREAK-FREEZE ingezet [1x/week]')}
    else S.streak=0;
  }else if(gap>3)S.streak=0;
}
function bumpStreakIfNew(){
  if(S._streakDay!==todayStr()){S.streak++;S._streakDay=todayStr()}
  save();
}

/* wekelijkse samenvatting: sessies deze kalenderweek */
function weekSummary(){
  const now=new Date(todayStr());
  const mon=new Date(now);mon.setDate(now.getDate()-((now.getDay()+6)%7));
  const monStr=mon.toISOString().slice(0,10);
  let planned=0,done=0,rpeSum=0,rpeN=0;
  for(let i=0;i<7;i++){
    const ds=new Date(mon.getTime()+i*DAY).toISOString().slice(0,10);
    if(sessionForDate(ds))planned++;
    if(S.done[ds])done++;
  }
  S.history.filter(h=>h.d>=monStr).forEach(h=>{if(h.rpe){rpeSum+=h.rpe;rpeN++}});
  const prThisWeek=S.hyroxPRs.some(p=>p.date>=monStr&&p.sec===Math.min(...S.hyroxPRs.map(x=>x.sec)));
  return {planned,done,avgRpe:rpeN?Math.round(rpeSum/rpeN*10)/10:null,prThisWeek};
}

function progressTip(k){
  const l=S.exLog[k];
  if(!l||!l.length)return '';
  const last=l[l.length-1];
  if(!last.r)return '';
  /* als vorige RPE laag was OF reps hoog: stel voor te verzwaren */
  const kbs=S.gear&&S.gear.kbs.length?[...S.gear.kbs].sort((a,b)=>a-b):[];
  const nextKB=kbs.find(x=>x>last.w);
  if(last.r>=12&&nextKB)return `tip: probeer ${nextKB}kg`;
  if(last.r>=10)return `tip: mik op ${last.w}kg x ${last.r+2}`;
  return `tip: herhaal ${last.w}kg x ${last.r}, dan opbouwen`;
}

/* --- space audio: Web Audio bliepjes, geen bestanden --- */
let AC=null;
function actx(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch(e){AC=null}}return AC}
function blip(freq=440,dur=0.12,type='square',vol=0.15){
  const ac=actx();if(!ac)return;
  if(ac.state==='suspended')ac.resume();
  const o=ac.createOscillator(),g=ac.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0,ac.currentTime);
  g.gain.linearRampToValueAtTime(vol,ac.currentTime+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);
  o.connect(g);g.connect(ac.destination);
  o.start();o.stop(ac.currentTime+dur);
}
function buzz(ms){if(navigator.vibrate&&S.cues!==false)navigator.vibrate(ms)}
/* cue-types in space-sfeer */
function cueTick(){if(S.cues===false)return;blip(660,0.06,'square',0.08)}          /* zachte klok-tik */
function cueCountdown(){if(S.cues===false)return;blip(880,0.1,'sine',0.14);buzz(40)} /* 3-2-1 sonar-ping */
function cueSwitch(){if(S.cues===false)return;blip(1320,0.14,'square',0.16);blip(990,0.14,'square',0.12);buzz([60,40,60])} /* stationswissel: dubbele sci-fi */
function cueWork(){if(S.cues===false)return;blip(1046,0.16,'sawtooth',0.16);buzz(80)}  /* WERK: fel */
function cueRest(){if(S.cues===false)return;blip(392,0.2,'sine',0.14);buzz(50)}        /* RUST: laag/kalm */
function cueDone(){if(S.cues===false)return;[523,659,784,1046].forEach((f,i)=>setTimeout(()=>blip(f,0.18,'square',0.16),i*140));buzz([100,60,100,60,200])} /* mission complete */

/* de eigenlijke runner: full-screen overlay met grote klok */
function startEngine(fmt,cfg,opts={}){
  ENG.cfg={fmt,...cfg};ENG.running=true;ENG.paused=false;ENG.elapsed=0;ENG.lastWhole=-1;ENG.round=0;ENG.phase='work';
  ENG.onFinish=opts.onFinish||null;
  ENG.total = fmt==='amrap'?cfg.dur : fmt==='emom'?cfg.mins*60 : fmt==='hiit'?(cfg.work+cfg.rest)*cfg.rounds : (cfg.cap||0);
  ENG.start=Date.now();
  const ov=document.createElement('div');ov.className='overlay';ov.id='engineOverlay';
  ov.innerHTML=`<div class="sheet" style="text-align:center">
    <h2 style="font-size:10px" id="eng-title">${FORMATS[fmt].name}${opts.label?' — '+opts.label:''}</h2>
    <div id="eng-phase" class="badge" style="margin:8px auto;display:inline-block">GO</div>
    <div class="timer" id="eng-clock" style="font-size:40px">00:00</div>
    <div id="eng-sub" class="tiny dim"></div>
    <div id="eng-round" class="timer" style="font-size:18px;margin:6px 0"></div>
    ${fmt==='amrap'||fmt==='fortime'?`<button class="btn ghost" style="margin-top:6px" id="eng-count">RONDE +1 <span id="eng-rc">(0)</span></button>`:''}
    <div class="row" style="margin-top:12px">
      <button class="btn ghost" id="eng-pause">PAUZE</button>
      <button class="btn" id="eng-stop">${fmt==='fortime'?'FINISH':'STOP'}</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  let rc=0;
  const rcBtn=ov.querySelector('#eng-count');
  if(rcBtn)rcBtn.onclick=()=>{rc++;ov.querySelector('#eng-rc').textContent=`(${rc})`;cueTick();ENG.round=rc};
  ov.querySelector('#eng-pause').onclick=e=>{
    ENG.paused=!ENG.paused;
    if(ENG.paused){ENG.pauseAt=Date.now();e.target.textContent='HERVAT'}
    else{ENG.start+=Date.now()-ENG.pauseAt;e.target.textContent='PAUZE'}
  };
  ov.querySelector('#eng-stop').onclick=()=>finishEngine(rc);
  cueCountdown();
  tickEngine();
}
function tickEngine(){
  if(!ENG.running)return;
  ENG.raf=requestAnimationFrame(tickEngine);
  if(ENG.paused)return;
  const t=(Date.now()-ENG.start)/1000;
  ENG.elapsed=t;
  const clock=$('#eng-clock'),phaseEl=$('#eng-phase'),subEl=$('#eng-sub'),roundEl=$('#eng-round');
  const whole=Math.floor(t);
  const {fmt}=ENG.cfg;
  /* countdown-tikjes laatste 3 sec van een fase/totaal */
  if(fmt==='fortime'){
    if(clock)clock.textContent=fmtTime(t);
    if(ENG.total&&t>=ENG.total){cueDone();finishEngine(ENG.round);return}
    if(ENG.total&&subEl)subEl.textContent=`limiet ${fmtTime(ENG.total)}`;
  }
  else if(fmt==='amrap'){
    const left=Math.max(0,ENG.total-t);
    if(clock)clock.textContent=fmtTime(left);
    if(subEl)subEl.textContent='resterend';
    if(whole!==ENG.lastWhole&&left<=3&&left>0)cueCountdown();
    if(left<=0){cueDone();finishEngine(ENG.round);return}
  }
  else if(fmt==='emom'){
    const minIdx=Math.floor(t/60);
    const inMin=t%60;
    if(clock)clock.textContent=fmtTime(60-inMin);
    if(roundEl)roundEl.textContent=`MINUUT ${Math.min(minIdx+1,ENG.cfg.mins)} / ${ENG.cfg.mins}`;
    if(subEl)subEl.textContent='tot volgende minuut';
    if(minIdx!==ENG.round&&minIdx<ENG.cfg.mins){ENG.round=minIdx;cueSwitch();flash('var(--g3)');if(phaseEl)phaseEl.textContent='GO'}
    if(whole!==ENG.lastWhole&&(60-inMin)<=3&&(60-inMin)>0)cueCountdown();
    if(t>=ENG.total){cueDone();finishEngine(ENG.cfg.mins);return}
  }
  else if(fmt==='hiit'){
    const cycle=ENG.cfg.work+ENG.cfg.rest;
    const rnd=Math.floor(t/cycle);
    const inCycle=t%cycle;
    const inWork=inCycle<ENG.cfg.work;
    const phaseLeft=inWork?ENG.cfg.work-inCycle:cycle-inCycle;
    if(clock)clock.textContent=fmtTime(phaseLeft);
    if(roundEl)roundEl.textContent=`RONDE ${Math.min(rnd+1,ENG.cfg.rounds)} / ${ENG.cfg.rounds}`;
    /* fase-wissel detecteren */
    const nowPhase=inWork?'work':'rest';
    if(nowPhase!==ENG.phase||rnd!==ENG.round){
      ENG.phase=nowPhase;ENG.round=rnd;
      if(nowPhase==='work'){cueWork();flash('var(--g3b)');if(phaseEl){phaseEl.textContent='WERK';phaseEl.style.borderStyle='solid'}}
      else{cueRest();flash('var(--g2)');if(phaseEl){phaseEl.textContent='RUST';phaseEl.style.borderStyle='dashed'}}
    }
    if(subEl)subEl.textContent=inWork?'WERKEN':'rustig aan';
    if(whole!==ENG.lastWhole&&phaseLeft<=3&&phaseLeft>0)cueCountdown();
    if(t>=ENG.total){cueDone();finishEngine(ENG.cfg.rounds);return}
  }
  ENG.lastWhole=whole;
}
function finishEngine(rounds){
  stopEngine();
  const ov=$('#engineOverlay');if(ov)ov.remove();
  const sec=Math.round(ENG.elapsed);
  /* benchmark? aparte opslag + PR */
  if(ENG.onFinish){ENG.onFinish(sec,rounds);return}
  /* gewone timer: kleine beloning, telt als activiteit */
  S.lastActive=todayStr();bumpStreakIfNew();
  S.stats.grit+=2;
  gainXP(15,6);
  toast(`ENGINE KLAAR — ${fmtTime(sec)}${rounds?` / ${rounds} rondes`:''} · +15 XP`);
  render('trn');
}

function drawBenchChart(){
  const cv=$('#benchchart');if(!cv)return;
  const ctx=cv.getContext('2d');const P=pal();
  ctx.fillStyle=P[0];ctx.fillRect(0,0,160,50);
  const pts=S.hyroxPRs.slice(-10);
  const min=Math.min(...pts.map(p=>p.sec))-5,max=Math.max(...pts.map(p=>p.sec))+5;
  const X=i=>Math.round(8+i*(144/(pts.length-1)));
  const Y=v=>Math.round(44-((v-min)/(max-min))*38);
  ctx.fillStyle=P[2];
  for(let i=0;i<pts.length-1;i++){const x1=X(i),y1=Y(pts[i].sec),x2=X(i+1),y2=Y(pts[i+1].sec);
    const st=Math.max(Math.abs(x2-x1),Math.abs(y2-y1));
    for(let s=0;s<=st;s++)ctx.fillRect(Math.round(x1+(x2-x1)*s/st),Math.round(y1+(y2-y1)*s/st),1,1)}
  ctx.fillStyle=P[3];pts.forEach((p,i)=>ctx.fillRect(X(i)-1,Y(p.sec)-1,3,3));
  ctx.fillStyle=P[2];ctx.font='6px monospace';ctx.fillText('lager=beter',8,10);
}

/* logboek / dagboek: sessie-historie + notities + mijlpalen chronologisch */
function logbookSheet(){

    items.push(`<div class="block"><div class="row"><span class="nm" style="color:var(--g3b)">${h.d}</span><div class="spacer"></div><span class="tiny dim">${dayLabel(h.type)}</span></div>

      ${note?`<p>&ldquo;${note}&rdquo;</p>`:''}</div>`);
  });
  sheet(`<h2 style="font-size:10px">LOGBOEK</h2>
    <p class="tiny dim">Chronologisch overzicht van je sessies en notities.</p>
    ${items.length?items.join(''):'<p style="margin-top:10px">Nog geen sessies gelogd. Je eerste komt hier te staan.</p>'}`);
}
function drawBwChart(){
  const cv=$('#bwchart');if(!cv)return;
  const ctx=cv.getContext('2d');
  const P=pal();
  ctx.fillStyle=P[0];ctx.fillRect(0,0,160,60);
  const pts=S.bw.slice(-12);
  if(pts.length<2){ctx.fillStyle=P[2];ctx.fillRect(6,28,4,4);return}
  const min=Math.min(...pts.map(p=>p.kg))-1, max=Math.max(...pts.map(p=>p.kg))+1;
  const X=i=>Math.round(8+i*(144/(pts.length-1)));
  const Y=v=>Math.round(52-((v-min)/(max-min))*44);
  /* raster */
  ctx.fillStyle=P[1];
  for(let y=8;y<56;y+=12)ctx.fillRect(4,y,152,1);
  /* lijn: blokjes tussen punten */
  ctx.fillStyle=P[2];
  for(let i=0;i<pts.length-1;i++){
    const x1=X(i),y1=Y(pts[i].kg),x2=X(i+1),y2=Y(pts[i+1].kg);
    const steps=Math.max(Math.abs(x2-x1),Math.abs(y2-y1));
    for(let s=0;s<=steps;s++)ctx.fillRect(Math.round(x1+(x2-x1)*s/steps),Math.round(y1+(y2-y1)*s/steps),1,1);
  }
  /* punten */
  ctx.fillStyle=P[3];
  pts.forEach((p,i)=>ctx.fillRect(X(i)-1,Y(p.kg)-1,3,3));
  /* labels */
  ctx.fillStyle=P[2];ctx.font='6px monospace';
  ctx.fillText(String(pts[pts.length-1].kg)+'KG',120,10);
}

/* ---------------- PWA: manifest + service worker (inline, 1-bestand) ---------------- */
(function setupPWA(){
  try{
    const manifest={
      name:'GRIT — Specimen Monitor',short_name:'GRIT',
      start_url:'.',scope:'.',display:'standalone',orientation:'portrait',
      background_color:'#0f2a12',theme_color:'#0f2a12',
      icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230f2a12'/%3E%3Crect x='4' y='3' width='8' height='8' fill='%236fae5c'/%3E%3Crect x='5' y='5' width='2' height='2' fill='%230f2a12'/%3E%3Crect x='9' y='5' width='2' height='2' fill='%230f2a12'/%3E%3C/svg%3E",sizes:'any',type:'image/svg+xml',purpose:'any'}]
    };
    const mBlob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
    const mLink=document.createElement('link');mLink.rel='manifest';mLink.href=URL.createObjectURL(mBlob);
    document.head.appendChild(mLink);
    /* service worker: cache-first van de eigen pagina, zodat de app offline opent */
    if('serviceWorker' in navigator){
      const sw=`
        const C='grit-v4';
        self.addEventListener('install',e=>{self.skipWaiting()});
        self.addEventListener('activate',e=>{e.waitUntil(clients.claim())});
        self.addEventListener('fetch',e=>{
          if(e.request.method!=='GET')return;
          e.respondWith(
            caches.open(C).then(cache=>
              cache.match(e.request).then(hit=>{
                const net=fetch(e.request).then(res=>{
                  if(res&&res.status===200&&(e.request.url.startsWith('http')))cache.put(e.request,res.clone());
                  return res;
                }).catch(()=>hit);
                return hit||net;
              })
            )
          );
        });`;
      const swURL=URL.createObjectURL(new Blob([sw],{type:'text/javascript'}));
      navigator.serviceWorker.register(swURL).catch(()=>{});
    }
  }catch(e){/* PWA optioneel — app werkt sowieso */}
})();
